name: Push packages to NuGet

on:
  release:
    types: [ published ]

jobs:

  release:
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: true
      ContinuousIntegrationBuild: true

    steps:
      - name: Check out our repo
        uses: actions/checkout@v7

      - name: Install .NET 10.0
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: |
          dotnet build -c Release ManagedMidi.slnx
          dotnet test -c Release ManagedMidi.slnx

      - name: Push to NuGet 
        run: |
          dotnet pack -c Release -o $PWD/nuget ManagedMidi
          for file in nuget/*.nupkg; do dotnet nuget push -s https://api.nuget.org/v3/index.json -k ${{secrets.NUGET_API_KEY}} $file; done
