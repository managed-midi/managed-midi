on: [push, pull_request]
name: Continuous Integration Build and Test

jobs:
  build:
    name: Build
    timeout-minutes: 60
    strategy:
      # Failure in one platform build won't impact the others
      fail-fast: false
      matrix:
        build:
          # For now, only build and test on Windows. It's better
          # than nothing... we'll come back to these. See
          # https://github.com/managed-midi/managed-midi/issues/3
          #- name: 'Linux'
          #  platform:  'linux/amd64'
          #  os: 'ubuntu-latest'
          - name: 'Windows'
            platform:  'windows/amd64'
            os: 'windows-latest'
          #- name: 'MacOS'
          #  platform:  'darwin/universal'
          #  os: 'macos-latest'

    runs-on: ${{ matrix.build.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install .NET 10.0
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: |
          dotnet build -c Release ManagedMidi.slnx
          dotnet test -c Release ManagedMidi.slnx

      - name: Pack 
        run: dotnet pack -c Release ManagedMidi
